name: Update Gist
on:
  push:
    branches: [ main, master ]
  schedule:
    - cron: "0 0 * * *" # 매일 자정 업데이트
  workflow_dispatch: # 수동 실행 버튼 활성화

jobs:
  update-gist:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Update Gist
        uses: bokub/github-stats-box@master # 'master' 브랜치를 직접 참조
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GIST_ID: ${{ secrets.GIST_ID }}
